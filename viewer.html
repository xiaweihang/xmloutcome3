<!DOCTYPE html>
<html>
<head>
<title>Display and Transform XML</title>
<script type="text/javascript">
function display() {
    //  远程服务器XML地址
    var xmlURL = "https://github.com/xiaweihang/xmloutcome3/badges.xml";
    // 本地XSLT文件
    var xmlstyleURL = "style.xsl";

    var xmlDocument, xmlStyleSheet;

    try {
        var request = new XMLHttpRequest();

        // 加载远程XML
        request.open("GET", xmlURL, false);
        request.send();
        xmlDocument = request.responseXML;

        // 加载本地XSLT
        request.open("GET", xmlstyleURL, false);
        request.send();
        xmlStyleSheet = request.responseXML;

        // 转换并显示
        var xsltProcessor = new XSLTProcessor();
        xsltProcessor.importStylesheet(xmlStyleSheet);
        var result = xsltProcessor.transformToFragment(xmlDocument, document);
        document.getElementById("output").appendChild(result);
    } catch (err) {
        alert("Error: " + err.message);
    }
}
</script>
</head>
<body onload="display()">
<div id="output"></div>
</body>
</html>
